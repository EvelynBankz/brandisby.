<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brand Store — Brandisby</title>
  <link rel="icon" href="../assets/logo-transparent.png" type="image/png"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/store.css"/>
  <script src="../js/subdomain-router.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body>

<!-- ── BRAND NAV ─────────────────────────────────────────────── -->
<nav class="brand-nav">
  <div class="brand-nav-inner">
    <a href="../index.html" class="brand-nav-back">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 12L6 8l4-4"/></svg>
      <img src="../assets/logo-light.png" alt="Brandisby" style="height:22px;width:auto;"/>
    </a>
    <div class="brand-nav-title" id="brand-nav-title">Loading…</div>
    <div class="brand-nav-right">
      <button class="cart-btn" id="cart-open-btn" aria-label="Open cart">
        🛒 <span class="cart-count" id="cart-count">0</span>
      </button>
    </div>
  </div>
</nav>

<!-- ── BRAND HEADER ───────────────────────────────────────────── -->
<header class="brand-header">
  <div class="brand-header-bg" id="brand-header-bg"></div>
  <div class="brand-header-overlay"></div>
  <div class="brand-header-content">
    <div class="brand-logo-wrap" id="brand-logo-wrap">
      <span class="brand-logo-initials" id="brand-logo-initials">B</span>
    </div>
    <div class="brand-header-text">
      <h1 class="brand-header-name" id="brand-header-name">Loading…</h1>
      <p class="brand-header-tagline" id="brand-header-tagline"></p>
      <p class="brand-header-url" id="brand-header-url"></p>
    </div>
  </div>
</header>

<!-- ── SHOP CONTROLS ─────────────────────────────────────────── -->
<div class="shop-controls">
  <div class="shop-controls-inner">
    <div class="search-field">
      <input type="search" id="search-input" placeholder="Search products…" autocomplete="off"/>
      <span class="search-icon">🔍</span>
    </div>
    <button class="filter-toggle-btn hidden" id="filter-toggle-btn">
      ⚙️ Filters
    </button>
    <div class="filter-controls" id="filter-controls">
      <select id="category-filter" class="filter-select" aria-label="Category">
        <option value="">All Categories</option>
        <option value="clothing">Clothing</option>
        <option value="accessories">Accessories</option>
        <option value="digital">Digital</option>
        <option value="prints">Prints</option>
        <option value="custom">Custom</option>
        <option value="other">Other</option>
      </select>
      <select id="sort-filter" class="filter-select" aria-label="Sort">
        <option value="newest">Newest</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
      </select>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="view-grid-btn" aria-label="Grid view">⊞</button>
      <button class="view-btn" id="view-list-btn" aria-label="List view">☰</button>
    </div>
  </div>
</div>

<!-- ── PRODUCTS ───────────────────────────────────────────────── -->
<section class="products-section">
  <div class="products-grid" id="products-grid">
    <div class="product-skeleton skeleton"></div>
    <div class="product-skeleton skeleton"></div>
    <div class="product-skeleton skeleton"></div>
    <div class="product-skeleton skeleton"></div>
  </div>
  <div class="products-empty hidden" id="products-empty">
    <div class="products-empty-icon">📦</div>
    <h3>No products yet</h3>
    <p>This brand is still setting up their store. Check back soon!</p>
  </div>
</section>

<!-- ── CART OVERLAY + DRAWER ─────────────────────────────────── -->
<div class="cart-overlay" id="cart-overlay"></div>
<aside class="cart-drawer" id="cart-drawer" aria-label="Shopping cart">
  <div class="cart-drawer-header">
    <h2 class="cart-drawer-title">Your Cart</h2>
    <button class="cart-drawer-close" id="cart-close-btn" aria-label="Close cart">✕</button>
  </div>
  <div class="cart-drawer-body" id="cart-body">
    <div class="cart-empty">
      <div class="cart-empty-icon">🛒</div>
      <p>Your cart is empty</p>
    </div>
  </div>
  <div class="cart-drawer-footer" id="cart-footer" style="display:none;">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-value" id="cart-total">₦0</span>
    </div>
    <div class="cart-drawer-btns">
      <a href="#" class="btn btn-primary btn-full btn-lg" id="checkout-link">Proceed to Checkout →</a>
      <button class="btn btn-ghost btn-full" id="cart-continue-btn">Continue Shopping</button>
    </div>
  </div>
</aside>

<!-- ── FOOTER ─────────────────────────────────────────────────── -->
<footer class="brand-footer">
  Powered by <a href="../index.html">
    <img src="../assets/logo-light.png" alt="Brandisby" class="brand-footer-logo"/>
  </a>
</footer>

<div id="toast-container"></div>

<script src="../js/firebase-config.js"></script>
<script src="../js/brand.js"></script>
</body>
</html>
