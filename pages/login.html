<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Brandisby</title>
  <link rel="icon" href="../assets/logo-transparent.png" type="image/png"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/pages.css"/>
  <script src="../js/subdomain-router.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body class="auth-page">
<div class="auth-layout">

  <!-- Left -->
  <div class="auth-panel-left">
    <div class="auth-left-content">
      <h1 class="auth-left-title">Welcome<br/><em>back.</em></h1>
      <p class="auth-left-sub">Sign in to manage your brand, track orders, and keep growing your Brandisby store.</p>
      <div class="auth-left-features">
        <div class="auth-feature">Your brand dashboard awaits</div>
        <div class="auth-feature">View and manage all orders</div>
        <div class="auth-feature">Update your products &amp; storefront</div>
      </div>
    </div>
  </div>

  <!-- Right -->
  <div class="auth-panel-right">
    <div class="auth-form-wrap">
      <a href="../index.html" class="auth-back-link">
        <img src="../assets/logo-light.png" alt="Brandisby" style="height:22px;width:auto;"/>
      </a>
      <h2 class="auth-heading">Sign in</h2>
      <p class="auth-sub">Don't have an account? <a href="creator-signup.html">Create your brand free →</a></p>

      <div class="form-group">
        <label class="label">Email Address</label>
        <input type="email" class="input" id="login-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="label">Password</label>
        <input type="password" class="input" id="login-password" placeholder="Your password" autocomplete="current-password"/>
      </div>
      <div style="text-align:right;margin:-0.5rem 0 1.5rem;">
        <a href="#" id="forgot-btn" style="font-size:0.82rem;color:var(--brown);text-decoration:none;">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="login-btn">Sign In →</button>

      <div class="divider">or</div>
      <a href="creator-signup.html" class="btn btn-ghost btn-full">Create a New Brand</a>
    </div>
  </div>

</div>
<div id="toast-container"></div>
<script src="../js/firebase-config.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  Auth.onAuthChange(u => { if (u) window.location.href = 'dashboard.html'; });

  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-password').value;
    if (!email || !pass) { Toast.show('Please enter email and password', 'error'); return; }
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      await Auth.signIn(email, pass);
      window.location.href = 'dashboard.html';
    } catch(e) {
      Toast.show('Incorrect email or password', 'error');
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  });

  document.getElementById('login-password').addEventListener('keypress', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  document.getElementById('forgot-btn').addEventListener('click', async e => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    if (!email) { Toast.show('Enter your email first', 'error'); return; }
    try {
      await auth.sendPasswordResetEmail(email);
      Toast.show('Password reset email sent!', 'success');
    } catch(e) { Toast.show('Could not send reset email', 'error'); }
  });
});
</script>
</body>
</html>
