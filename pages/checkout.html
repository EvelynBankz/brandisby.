<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — Brandisby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/checkout.css">
  <script src="../js/subdomain-router.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body class="checkout-page">

  <nav class="checkout-nav">
    <a href="#" id="back-to-store" class="brand-nav-back">
      <img src="../logo-light.png" alt="Brandisby" class="brand-nav-back-logo" />
    </a>
    <span class="checkout-nav-brand" id="checkout-brand-name">Checkout</span>
    <div class="checkout-steps">
      <span class="step active" data-step="cart">Cart</span>
      <span class="step-divider">›</span>
      <span class="step" data-step="details" id="step-details">Details</span>
      <span class="step-divider">›</span>
      <span class="step" data-step="payment" id="step-payment">Payment</span>
    </div>
  </nav>

  <main class="checkout-main">
    <div class="checkout-inner">

      <!-- LEFT: FORM AREA -->
      <div class="checkout-form-area">

        <!-- STEP 1: CART REVIEW -->
        <section class="checkout-step active" id="step-cart">
          <h2 class="step-heading">Review Your Cart</h2>
          <div id="cart-review-list"></div>
          <button class="btn-primary-lg" id="to-details-btn" style="width:100%;justify-content:center;margin-top:2rem;">Continue to Details →</button>
        </section>

        <!-- STEP 2: CUSTOMER DETAILS -->
        <section class="checkout-step" id="step-details-form">
          <h2 class="step-heading">Shipping Details</h2>
          <div class="form-row">
            <div class="form-group">
              <label>First Name *</label>
              <input type="text" id="fname" class="form-input" placeholder="John" required/>
            </div>
            <div class="form-group">
              <label>Last Name *</label>
              <input type="text" id="lname" class="form-input" placeholder="Doe" required/>
            </div>
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="email" class="form-input" placeholder="john@example.com" required/>
          </div>
          <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" id="phone" class="form-input" placeholder="+234 800 000 0000" required/>
          </div>
          <div class="form-group">
            <label>Delivery Address *</label>
            <input type="text" id="address" class="form-input" placeholder="123 Main Street, Apartment 4B" required/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>City *</label>
              <input type="text" id="city" class="form-input" placeholder="Lagos" required/>
            </div>
            <div class="form-group">
              <label>State *</label>
              <input type="text" id="state" class="form-input" placeholder="Lagos State" required/>
            </div>
          </div>
          <div class="form-group">
            <label>Country *</label>
            <select id="country" class="form-input">
              <option value="NG">Nigeria</option>
              <option value="GH">Ghana</option>
              <option value="KE">Kenya</option>
              <option value="ZA">South Africa</option>
              <option value="OTHER">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Order Notes (optional)</label>
            <textarea id="order-notes" class="form-input" rows="3" placeholder="Any special instructions?"></textarea>
          </div>
          <div class="form-actions">
            <button class="btn-ghost-lg" id="back-to-cart-btn">← Back to Cart</button>
            <button class="btn-primary-lg" id="to-payment-btn">Continue to Payment →</button>
          </div>
        </section>

        <!-- STEP 3: PAYMENT -->
        <section class="checkout-step" id="step-payment-form">
          <h2 class="step-heading">Payment</h2>
          <div class="payment-summary">
            <div class="payment-customer" id="payment-customer-info"></div>
          </div>
          <div class="payment-methods">
            <div class="payment-method active" id="pay-paystack">
              <div class="payment-method-radio"></div>
              <div class="payment-method-info">
                <div class="payment-method-name">Pay with Paystack</div>
                <div class="payment-method-desc">Card, Bank Transfer, USSD, Mobile Money</div>
              </div>
              <div class="paystack-logo">🔒 Paystack</div>
            </div>
          </div>
          <div class="payment-note">
            🔒 Your payment is secured by Paystack. All transactions are encrypted.
          </div>
          <div class="form-actions">
            <button class="btn-ghost-lg" id="back-to-details-btn">← Back to Details</button>
            <button class="btn-primary-lg" id="pay-now-btn">
              <span id="pay-now-text">Pay ₦0 Now</span>
            </button>
          </div>
        </section>

      </div>

      <!-- RIGHT: ORDER SUMMARY -->
      <aside class="order-summary">
        <h3 class="summary-heading">Order Summary</h3>
        <div id="order-items-list"></div>
        <div class="summary-totals">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="summary-subtotal">₦0</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span id="summary-shipping">Calculated at checkout</span>
          </div>
          <div class="summary-row total-row">
            <span>Total</span>
            <span id="summary-total">₦0</span>
          </div>
        </div>
        <div class="summary-brand-badge" id="summary-brand"></div>
      </aside>

    </div>
  </main>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/checkout.js"></script>
</body>
</html>
