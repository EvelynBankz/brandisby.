<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brand Store — Brandisby</title>
  <link rel="icon" href="../assets/logo-transparent.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/store.css"/>
  <script src="../js/subdomain-router.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body>

<nav class="brand-nav">
  <div class="brand-nav-inner">
    <a href="../index.html" class="brand-nav-back" aria-label="Back to Brandisby">
      <span class="brand-nav-back-icon">←</span>
      <img src="../assets/logo-light.png" alt="Brandisby"/>
    </a>
    <div class="brand-nav-name" id="brand-nav-name">—</div>
    <div class="brand-nav-right">
      <button class="cart-trigger" id="cart-open" aria-label="Open cart">
        <span>🛒</span>
        <span class="cart-badge" id="cart-count">0</span>
      </button>
    </div>
  </div>
</nav>

<header class="brand-hero">
  <div class="brand-hero-bg" id="brand-hero-bg"></div>
  <div class="brand-hero-overlay"></div>
  <div class="brand-hero-content">
    <div class="brand-hero-logo" id="brand-hero-logo">
      <span class="brand-hero-logo-text" id="brand-logo-initials">B</span>
    </div>
    <div class="brand-hero-info">
      <h1 class="brand-hero-name" id="brand-hero-name">Loading…</h1>
      <p class="brand-hero-tagline" id="brand-hero-tagline"></p>
      <p class="brand-hero-url" id="brand-hero-url"></p>
    </div>
  </div>
</header>

<div class="shop-bar">
  <div class="shop-bar-inner">
    <div class="shop-search">
      <input type="search" id="search-input" placeholder="Search products…" autocomplete="off" aria-label="Search"/>
      <span class="shop-search-icon">🔍</span>
    </div>
    <button class="filter-toggle hidden" id="filter-toggle-btn">⚙️ Filters</button>
    <div class="shop-filters" id="shop-filters">
      <select id="cat-filter" class="filter-pill" aria-label="Category">
        <option value="">All Categories</option>
        <option value="clothing">Clothing</option>
        <option value="accessories">Accessories</option>
        <option value="digital">Digital</option>
        <option value="prints">Prints</option>
        <option value="custom">Custom</option>
        <option value="other">Other</option>
      </select>
      <select id="sort-filter" class="filter-pill" aria-label="Sort">
        <option value="newest">Newest</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
      </select>
    </div>
    <div class="view-btns">
      <button class="view-btn active" id="view-grid-btn" aria-label="Grid view">⊞</button>
      <button class="view-btn" id="view-list-btn" aria-label="List view">☰</button>
    </div>
  </div>
</div>

<section class="products-area">
  <div class="products-grid" id="products-grid">
    <div class="product-skeleton skeleton"></div>
    <div class="product-skeleton skeleton"></div>
    <div class="product-skeleton skeleton"></div>
    <div class="product-skeleton skeleton"></div>
    <div class="product-skeleton skeleton"></div>
    <div class="product-skeleton skeleton"></div>
  </div>
  <div class="products-empty hidden" id="products-empty">
    <div class="products-empty-icon">📦</div>
    <h3>No products yet</h3>
    <p>This brand is setting up their store. Check back soon.</p>
  </div>
</section>

<!-- Cart veil + panel -->
<div class="cart-veil" id="cart-veil"></div>
<aside class="cart-panel" id="cart-panel" aria-label="Cart">
  <div class="cart-panel-head">
    <h2 class="cart-panel-title">Your Cart</h2>
    <button class="cart-close-btn" id="cart-close" aria-label="Close cart">✕</button>
  </div>
  <div class="cart-panel-body" id="cart-body">
    <div class="cart-empty-state">
      <div class="cart-empty-icon">🛒</div>
      <p>Your cart is empty</p>
    </div>
  </div>
  <div class="cart-panel-foot hidden" id="cart-foot">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-val" id="cart-total">₦0</span>
    </div>
    <div class="cart-panel-btns">
      <a href="#" class="btn btn-brown btn-full btn-lg" id="checkout-link">Checkout →</a>
      <button class="btn btn-ghost btn-full" id="cart-continue">Continue Shopping</button>
    </div>
  </div>
</aside>

<footer class="brand-footer">
  Powered by
  <a href="../index.html">
    <img src="../assets/logo-light.png" alt="Brandisby" style="height:13px;display:inline;vertical-align:middle;margin-left:4px;opacity:0.5;"/>
  </a>
</footer>

<div id="toast-container"></div>
<script src="../js/firebase-config.js"></script>
<script src="../js/brand.js"></script>
</body>
</html>
